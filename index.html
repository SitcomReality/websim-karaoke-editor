<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke Editor</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.10.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
      "imports": {
        "color-thief-browser": "https://ga.jspm.io/npm:colorthief@2.4.0/dist/color-thief.mjs"
      }
    }
    </script>
</head>
<body>
    <div class="container">
        <header class="main-header">
            <div id="song-image-container">
                <!-- Song title image will go here -->
                 <img id="song-image" src="" alt="Song title image" style="display: none;">
            </div>
            <h1 id="song-title">Karaoke Editor</h1>
        </header>

        <main class="main-content">
            <div class="lyrics-container">
                <ul id="lyrics-list">
                    <!-- Lyrics will be loaded here -->
                    <li class="placeholder">Load lyrics file to start...</li>
                </ul>
            </div>

            <div class="controls-container">
                 <div class="playback-controls">
                    <button id="prev-song" title="Previous Song (Playlist)">&lt;&lt;</button>
                    <button id="play-pause" title="Play/Pause">Play</button>
                    <button id="next-song" title="Next Song (Playlist)">&gt;&gt;</button>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" title="Volume">
                 </div>
                 <div class="progress-controls">
                     <span id="current-time">0:00</span>
                     <input type="range" id="progress-bar" value="0" step="0.1" title="Seek">
                     <span id="duration">0:00</span>
                 </div>
            </div>

            <div class="timing-editor" style="display: none;">
                <h2>Timing Editor</h2>
                <p>Current Line Time: <span id="current-line-time">--:--</span></p>
                <button id="set-line-start">Set Start Time</button>
                <button id="set-line-end">Set End Time</button>
                <button id="nudge-back">Nudge Back (-0.1s)</button>
                <button id="nudge-forward">Nudge Forward (+0.1s)</button>
                <p><i>Click a lyric line above to select it for editing.</i></p>
                <!-- More advanced editor features can go here -->
            </div>
        </main>

        <aside class="sidebar">
            <div class="panel file-inputs">
                <h3>Load Files</h3>
                <label for="audio-upload">Audio (MP3):</label>
                <input type="file" id="audio-upload" accept=".mp3,audio/mpeg">

                <label for="lyrics-upload">Lyrics (.txt, .lrc):</label>
                <input type="file" id="lyrics-upload" accept=".txt,.lrc">

                <label for="image-upload">Title Image:</label>
                <input type="file" id="image-upload" accept="image/*">

                <button id="load-files-button">Load New Song</button>
                <button id="toggle-editor-button">Show Timing Editor</button>
            </div>

             <div class="panel customization">
                <h3>Customize</h3>
                 <label for="font-select">Font:</label>
                 <select id="font-select">
                     <option value="'Arial', sans-serif">Arial</option>
                     <option value="'Verdana', sans-serif">Verdana</option>
                     <option value="'Georgia', serif">Georgia</option>
                     <option value="'Times New Roman', serif">Times New Roman</option>
                     <option value="'Courier New', monospace">Courier New</option>
                     <!-- Google fonts can be added dynamically -->
                 </select>
                 <input type="text" id="google-font-input" placeholder="Or enter Google Font name">
                 <button id="load-google-font">Load Font</button>

                 <label>Theme Colors:</label>
                 <div class="color-palette">
                    <input type="color" id="color-bg" title="Background Color">
                    <input type="color" id="color-text" title="Text Color">
                    <input type="color" id="color-highlight-bg" title="Highlight Background">
                    <input type="color" id="color-highlight-text" title="Highlight Text">
                 </div>
                 <button id="apply-theme">Apply Theme</button>
                 <button id="extract-colors">Extract from Image</button>
            </div>

            <div class="panel project-management">
                <h3>Project</h3>
                <input type="text" id="project-name" placeholder="Enter song name">
                <button id="save-project">Save Song Data</button>
                <button id="export-project">Export Song Data (.json)</button>
                <label for="import-project">Import Song Data (.json):</label>
                <input type="file" id="import-project" accept=".json">
            </div>


            <div class="panel history-panel">
                <h3>History</h3>
                <ul id="history-list">
                    <!-- Saved projects listed here -->
                </ul>
            </div>

            <div class="panel playlist-panel">
                <h3>Playlist</h3>
                <ul id="playlist-list" class="sortable-list">
                    <!-- Playlist songs listed here -->
                </ul>
                <button id="save-playlist">Save Playlist</button>
                <button id="clear-playlist">Clear Playlist</button>
                 <label for="import-playlist">Import Playlist (.json):</label>
                <input type="file" id="import-playlist" accept=".json">
                <button id="export-playlist">Export Playlist (.json)</button>
            </div>

             <div class="panel assets-panel">
                <h3>Session Assets</h3>
                <h4>Audio Files:</h4>
                <ul id="audio-assets-list"></ul>
                <h4>Images:</h4>
                <ul id="image-assets-list"></ul>
            </div>
        </aside>

        <audio id="audio-player" preload="metadata"></audio>
    </div>

    <script type="module" src="script.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
